<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'Segoe UI',Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b1d12"/>
      <stop offset="0.55" stop-color="#3d2a17"/>
      <stop offset="1" stop-color="#1a1108"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7c071"/>
      <stop offset="1" stop-color="#c8962f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e7c071" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#e7c071" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="620" cy="120" r="220" fill="url(#glow)"/>
  <circle cx="120" cy="430" r="180" fill="url(#glow)" opacity="0.6"/>

  <!-- dotted route -->
  <path d="M70 360 C 220 250, 360 430, 520 300 S 760 220, 740 150" fill="none"
        stroke="url(#gold)" stroke-width="3" stroke-dasharray="2 14" stroke-linecap="round" opacity="0.8"/>
  <circle cx="70" cy="360" r="9" fill="url(#gold)"/>
  <circle cx="740" cy="150" r="9" fill="url(#gold)"/>

  <!-- glass card -->
  <g transform="translate(60 70)">
    <rect width="430" height="170" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="32" y="58" font-size="14" letter-spacing="3" fill="#e7c071" font-weight="700">RICHE BOIS · LOGISTIQUE</text>
    <text x="32" y="104" font-size="38" font-weight="800" fill="#fbf6ec">Transport &amp; Livraison</text>
    <text x="32" y="140" font-size="17" fill="#d8c9b2">Spring Boot · Angular · React Native · QR · GPS</text>
  </g>

  <!-- truck -->
  <g transform="translate(470 300)">
    <rect x="0" y="-70" width="170" height="92" rx="12" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="170" y="-44" width="78" height="66" rx="10" fill="url(#gold)"/>
    <rect x="184" y="-32" width="46" height="30" rx="6" fill="#2b1d12" opacity="0.6"/>
    <circle cx="46" cy="34" r="22" fill="#15100a" stroke="url(#gold)" stroke-width="6"/>
    <circle cx="208" cy="34" r="22" fill="#15100a" stroke="url(#gold)" stroke-width="6"/>
    <circle cx="46" cy="34" r="6" fill="#e7c071"/>
    <circle cx="208" cy="34" r="6" fill="#e7c071"/>
    <!-- box / package -->
    <rect x="28" y="-50" width="48" height="48" rx="6" fill="#e7c071" opacity="0.9"/>
    <path d="M28 -26 H76 M52 -50 V-2" stroke="#2b1d12" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- QR glyph -->
  <g transform="translate(610 70)" fill="#fbf6ec" opacity="0.9">
    <rect width="86" height="86" rx="10" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.18"/>
    <g transform="translate(14 14)" fill="#e7c071">
      <rect width="18" height="18" rx="3"/><rect x="40" width="18" height="18" rx="3"/>
      <rect y="40" width="18" height="18" rx="3"/><rect x="26" y="26" width="10" height="10"/>
      <rect x="44" y="44" width="14" height="14" rx="2"/>
    </g>
  </g>
</svg>
